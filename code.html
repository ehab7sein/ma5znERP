<body class="min-h-screen flex items-center justify-center p-lg md:p-2xl">
<!-- Login Card Container -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05),0_1px_2px_rgba(0,0,0,0.05)] border border-outline-variant w-full max-w-[440px] p-xl flex flex-col gap-xl">
<!-- Header Section -->
<div class="flex flex-col items-center text-center gap-sm">
<!-- Brand Logo/Icon -->
<div class="w-16 h-16 bg-primary-container/10 rounded-full flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">warehouse</span>
</div>
<!-- System Name -->
<span class="font-title-md text-title-md text-on-surface-variant uppercase tracking-wider">مخزن الأحذية</span>
<!-- Heading -->
<h1 class="font-headline-lg text-headline-lg text-on-surface">تسجيل دخول المسؤول</h1>
<p class="font-body-md text-body-md text-on-surface-variant">الرجاء إدخال بيانات الاعتماد الخاصة بك للوصول إلى لوحة التحكم.</p>
</div>
<!-- Form Section -->
<form action="#" class="flex flex-col gap-lg" method="POST">
<!-- Username Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant text-right" for="username">اسم المستخدم</label>
<div class="relative flex items-center border border-outline-variant rounded-lg bg-surface-container-lowest input-glow transition-all duration-200">
<div class="absolute right-0 pr-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">person</span>
</div>
<input class="w-full bg-transparent border-none focus:ring-0 py-sm pr-[40px] pl-md font-body-md text-body-md text-on-surface rounded-lg" id="username" name="username" placeholder="أدخل اسم المستخدم" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant text-right" for="password">كلمة المرور</label>
<div class="relative flex items-center border border-outline-variant rounded-lg bg-surface-container-lowest input-glow transition-all duration-200">
<div class="absolute right-0 pr-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="w-full bg-transparent border-none focus:ring-0 py-sm pr-[40px] pl-[40px] font-body-md text-body-md text-on-surface rounded-lg" id="password" name="password" placeholder="أدخل كلمة المرور" type="password"/>
<button class="absolute left-0 pl-sm flex items-center text-outline hover:text-primary transition-colors cursor-pointer" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Actions Row (Remember Me & Forgot Password) -->
<div class="flex items-center justify-between mt-sm">
<div class="flex items-center gap-xs">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary-container" id="remember" name="remember" type="checkbox"/>
<label class="font-label-sm text-label-sm text-on-surface-variant cursor-pointer" for="remember">تذكرني</label>
</div>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">نسيت كلمة المرور؟</a>
</div>
<!-- Login Button -->
<button class="w-full bg-primary text-on-primary font-title-md text-title-md py-md rounded-lg shadow-sm hover:bg-primary-container transition-all duration-200 mt-sm active:scale-95 border-t border-white/20" type="submit">

            </button>
